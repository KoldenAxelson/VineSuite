services:
  app:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "0.0.0.0:8000:80"
    volumes:
      - ./api:/var/www/html
    depends_on:
      - postgres
      - redis
      - meilisearch
    environment:
      - APP_ENV=local

  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: vinesuite
      POSTGRES_USER: vinesuite
      POSTGRES_PASSWORD: secret
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  meilisearch:
    image: getmeili/meilisearch:v1
    ports:
      - "7700:7700"
    environment:
      - MEILI_NO_ANALYTICS=true
    volumes:
      - msdata:/meili_data

  mailpit:
    image: axllent/mailpit
    ports:
      - "8025:8025"
      - "1025:1025"

  horizon:
    build:
      context: ./api
      dockerfile: Dockerfile
    command: php artisan horizon
    volumes:
      - ./api:/var/www/html
    depends_on:
      - redis
      - postgres

volumes:
  pgdata:
  msdata:
